{% set name = "sklearn-genetic-opt" %}
{% set version = "0.12.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 4e526cc62b424706d6158048a0b50ecb0162fe8015d0c8889aaec1a2d40c0ac6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python >=3.8
    - pip
  run:
    - deap >=1.3.3
    - mlflow >=1.17.0
    - numpy >=1.19.0
    - python >=3.8
    - scikit-learn >=1.1.0
    - seaborn >=0.11.2
    - tensorflow >=2.0.0
    - tqdm >=4.61.1

test:
  imports:
    - sklearn_genetic
  commands:
    - pip list
    - pip check
  requires:
    - pip

about:
  home: https://github.com/rodrigo-arenas/Sklearn-genetic-opt
  summary: Scikit-lean models hyperparameters tuning, using evolutionary algorithms
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - goanpeca
    - rodrigo-arenas
